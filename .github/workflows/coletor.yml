name: Coletor AME-AMAZONIA

on:
  schedule:
    - cron: '0 12 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  coletar_noticias:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Executar script de coleta
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python coleta_noticias.py

      - name: Commit e Push do boletim.json
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add boletim.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated update: boletim.json" && git push)
